name: rag-eval

services:
  postgres-eval:
    image: pgvector/pgvector:pg17
    container_name: eval-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ragdb_eval
    tmpfs:
      - /var/lib/postgresql/data   # fresh DB on every run
    volumes:
      - ./services/ingestion-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ragdb_eval"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestion-eval:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: eval-ingestion
    depends_on:
      postgres-eval:
        condition: service_healthy
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres-eval
      DB_PORT: 5432
      DB_NAME: ragdb_eval
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEMETRY_ENABLED: "false"
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 5s
      timeout: 10s
      retries: 10

  query-eval:
    build:
      context: .
      dockerfile: services/query-service/Dockerfile
    container_name: eval-query
    depends_on:
      postgres-eval:
        condition: service_healthy
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres-eval
      DB_PORT: 5432
      DB_NAME: ragdb_eval
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEMETRY_ENABLED: "false"
    ports:
      - "8003:8001"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 5s
      timeout: 10s
      retries: 10
