services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/ingestion-service/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./infra/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API (used by Grafana datasource)
      - "4319:4317"   # OTLP gRPC (exposed on 4319 to avoid clash with collector)

  loki:
    image: grafana/loki:latest
    container_name: loki
    command: ["-config.file=/etc/loki/loki.yml"]
    volumes:
      - ./infra/loki.yml:/etc/loki/loki.yml
      - loki_data:/loki
    ports:
      - "3100:3100"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel/config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: ingestion-service
    depends_on:
      - postgres
      - otel-collector
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ragdb
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_SERVICE_NAME: ingestion-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8000:8000"
    volumes:
      - ./services/ingestion-service/app:/app/app  # dev mode (hot reload optional)
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000

  query-service:
    build:
      context: .
      dockerfile: services/query-service/Dockerfile
    container_name: query-service
    depends_on:
      - postgres
      - otel-collector
    environment:
      DB_USER: user
      DB_PASSWORD: password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ragdb
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_SERVICE_NAME: query-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8001:8001"
    volumes:
      - ./services/query-service/app:/app/app
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8001

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"   # Prometheus UI + query API (used by Grafana datasource)

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"   # Grafana UI

volumes:
  postgres_data:
  tempo_data:
  grafana_data:
  loki_data: